name: Build and Release

on:
  push:
    tags:
      - 'v*' # Сработает при создании тега, например v2.0.0

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: vfetch
            asset_name: vfetch
          - os: windows-latest
            artifact_name: vfetch.exe
            asset_name: vfetch.exe

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore VibeFetch_full.csproj

    - name: Build and Publish
      # Тут мы используем именно VibeFetch_full.csproj, как у тебя на скрине
      run: |
        dotnet publish VibeFetch_full.csproj -c Release -r ${{ matrix.os == 'windows-latest' && 'win-x64' || 'linux-x64' }} --self-contained true /p:PublishSingleFile=true /p:PublishTrimmed=false -o ./publish

    - name: Rename Artifact (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: mv ./publish/VibeFetch ./publish/vfetch

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ./publish/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./assets

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./assets/vfetch/vfetch
          ./assets/vfetch.exe/vfetch.exe
          install.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
