name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          RID=win-x64
        else
          RID=linux-x64
        fi

        dotnet publish VibeFetch.csproj -c Release -r $RID --self-contained true /p:PublishSingleFile=true -o publish

    - name: Rename
      run: |
        cd publish
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv *.exe vfetch.exe
        else
          chmod +x *
          mv $(find . -type f ! -name "*.*") vfetch
        fi

    - uses: actions/upload-artifact@v4
      with:
        name: vfetch-${{ matrix.os }}
        path: publish/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4

    - uses: softprops/action-gh-release@v2
      with:
        files: |
          vfetch-windows-latest/vfetch.exe
          vfetch-ubuntu-latest/vfetch
          install.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
