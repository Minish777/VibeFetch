name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            output: vfetch
          - os: windows-latest
            rid: win-x64
            output: vfetch.exe

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish
      run: dotnet publish VibeFetch.csproj -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishSingleFile=true -o publish

    - name: Rename binary
      run: |
        cd publish
        dir
      shell: pwsh

    - name: Normalize output
      run: |
        cd publish
        if ("${{ matrix.os }}" -eq "windows-latest") {
          Rename-Item *.exe vfetch.exe
        } else {
          chmod +x *
          mv $(ls | head -n 1) vfetch
        }
      shell: bash

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}
        path: publish/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4

    - uses: softprops/action-gh-release@v2
      with:
        files: |
          windows-latest/vfetch.exe
          ubuntu-latest/vfetch
          install.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
