name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            ext: ""
          - os: windows-latest
            rid: win-x64
            ext: ".exe"

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish
      run: dotnet publish VibeFetch.csproj -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishSingleFile=true -o publish

    # 👉 ВСЁ — НЕТ IF, НЕТ BASH
    - name: Rename binary (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd publish
        ren *.exe vfetch.exe

    - name: Rename binary (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd publish
        chmod +x *
        mv $(ls | head -n 1) vfetch

    - uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.os }}
        path: publish/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4

    - uses: softprops/action-gh-release@v2
      with:
        files: |
          build-windows-latest/vfetch.exe
          build-ubuntu-latest/vfetch
          install.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
