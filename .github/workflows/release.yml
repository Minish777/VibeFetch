name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          RID=win-x64
        else
          RID=linux-x64
        fi

        dotnet publish *.csproj \
          -c Release \
          -r $RID \
          --self-contained true \
          /p:PublishSingleFile=true \
          -o publish

    - name: Rename binary
      shell: bash
      run: |
        cd publish

        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv *.exe vfetch.exe
        else
          chmod +x *
          mv $(find . -type f ! -name "*.*") vfetch
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vfetch-${{ matrix.os }}
        path: publish/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download Windows
      uses: actions/download-artifact@v4
      with:
        name: vfetch-windows-latest
        path: win

    - name: Download Linux
      uses: actions/download-artifact@v4
      with:
        name: vfetch-ubuntu-latest
        path: linux

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          win/vfetch.exe
          linux/vfetch
          install.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
